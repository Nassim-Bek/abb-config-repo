spring:
  jackson:
    default-property-inclusion: non_null
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        instance-id: ${CONSUL_INSTANCE_ID:${spring.application.name}}
        prefer-ip-address: true
        health-check-path: /actuator/health
        health-check-critical-timeout: 1m
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/front-engine}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/front-engine/protocol/openid-connect/certs}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
logging:
  level:
    root: INFO
    ma.abb.archive: INFO
